---
ansible-navigator:
  ansible:
    inventory:
      entries:
        - /home/ansibleuser/inventory
  execution-environment:
    image: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest
    pull:
      policy: missing
  playbook-artifact:
    enable: false
  mode: stdout
  logging:
    level: info
    file: /dev/null